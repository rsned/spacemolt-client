name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: spacemolt-client-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: spacemolt-client-linux-arm64
          - os: macos-latest
            target: darwin-x64
            artifact: spacemolt-client-macos-x64
          - os: macos-latest
            target: darwin-arm64
            artifact: spacemolt-client-macos-arm64
          - os: windows-latest
            target: windows-x64
            artifact: spacemolt-client-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun build ./index.ts --compile --target=bun-${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
